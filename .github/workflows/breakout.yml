name: Generate Breakout

on:
  schedule:
    - cron: "0 0 * * *" # Runs every 24 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Breakout SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}
          # The SVGs will be generated in an 'output' folder
          output_path: output
          
      - name: Deploy to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: output
          branch: output
          clean: false  # ✅ CRITICAL: Prevents deleting your Snake/Pacman files
