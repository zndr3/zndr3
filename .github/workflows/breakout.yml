name: generate breakout svg

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # This step is the "Database Connection" of GitHub Actions
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: generate SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}

      # We move the outputs to 'dist' just like the Snake workflow does
      - name: Prepare files for deployment
        run: |
          mkdir -p dist
          cp output/light.svg dist/breakout-light.svg
          cp output/dark.svg dist/breakout-dark.svg

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # Both games now live on the 'output' branch
          build_dir: dist
          clean: false # Important: Keeps your Snake files and Breakout files together
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
