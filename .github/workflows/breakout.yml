name: generate breakout svg

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      # --- FETCH EXISTING GAMES ---
      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: dist
        continue-on-error: true

      - name: generate SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}

      - name: Prepare files for deployment
        run: |
          # Copy new breakout files into the 'dist' folder that has the other games
          cp output/light.svg dist/breakout-light.svg
          cp output/dark.svg dist/breakout-dark.svg

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          clean: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
