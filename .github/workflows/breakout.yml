name: generate breakout svg

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  generate-svg:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. THIS IS THE MISSING STEP: It downloads your repo into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Generate the game files
      - name: generate SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}

      # 3. Prepare the folder for deployment
      - name: Prepare files for deployment
        run: |
          mkdir -p dist
          cp output/light.svg dist/breakout-light.svg
          cp output/dark.svg dist/breakout-dark.svg

      # 4. Deploy using the James Ives action (or crazy-max)
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: github-breakout # The branch the action will deploy to.
          folder: dist # The folder the action should deploy.
          clean: false # Set to false so it doesn't delete existing files
